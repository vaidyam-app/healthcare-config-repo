server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: patient-service
          uri: lb://PATIENT-SERVICE
          predicates:
            - name: Path
              args:
                pattern: /patients/**
          filters:
            - name: RewritePath
              args:
                regexp: /patients/(?<segment>.*)
                replacement: /$\{segment}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
